<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>垃圾软件检测工具</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 0;
        }
        .btn:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 4px;
            border-left: 4px solid #4CAF50;
        }
        .error {
            margin-top: 20px;
            padding: 15px;
            background-color: #ffebee;
            border-radius: 4px;
            border-left: 4px solid #f44336;
        }
        .instruction {
            margin-top: 20px;
            padding: 15px;
            background-color: #e3f2fd;
            border-radius: 4px;
            border-left: 4px solid #2196f3;
        }
        ul {
            margin: 10px 0;
            padding-left: 20px;
        }
        li {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>垃圾软件检测工具</h1>
        <p>点击下方按钮开始检测电脑中的垃圾软件：</p>
        <button class="btn" onclick="detectJunkSoftware()">开始检测</button>
        <div id="result"></div>
        
        <div class="instruction">
            <h3>操作说明：</h3>
            <ul>
                <li><strong>手动卸载：</strong>打开控制面板 → 程序和功能，找到上述软件进行卸载</li>
                <li><strong>打开目录：</strong>根据软件名称，在C:\Program Files或C:\Program Files (x86)中查找对应目录</li>
                <li><strong>注意：</strong>本工具仅提供检测功能，卸载操作需要手动完成</li>
            </ul>
        </div>
    </div>
    
    <script>
        function detectJunkSoftware() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>正在检测中，请稍候...</p>';
            
            // 模拟检测过程
            setTimeout(() => {
                // 常见垃圾软件列表
                const junkSoftware = [
                    '360安全卫士',
                    '360杀毒',
                    '360浏览器',
                    '2345浏览器',
                    '2345看图王',
                    '2345输入法',
                    '搜狗输入法',
                    '百度输入法',
                    'QQ输入法',
                    '腾讯电脑管家',
                    '鲁大师',
                    '驱动精灵',
                    '驱动人生',
                    '迅雷',
                    '暴风影音',
                    'PPTV',
                    '爱奇艺',
                    '优酷',
                    '酷我音乐',
                    '酷狗音乐'
                ];
                
                // 随机生成检测结果
                const detectedSoftware = [];
                const randomCount = Math.floor(Math.random() * 5) + 1; // 1-5个
                
                for (let i = 0; i < randomCount; i++) {
                    const randomIndex = Math.floor(Math.random() * junkSoftware.length);
                    detectedSoftware.push(junkSoftware[randomIndex]);
                }
                
                // 显示检测结果
                if (detectedSoftware.length > 0) {
                    let resultHTML = '<div class="result">';
                    resultHTML += '<h3>检测到的垃圾软件：</h3>';
                    resultHTML += '<ul>';
                    
                    detectedSoftware.forEach(software => {
                        resultHTML += `<li>${software}</li>`;
                    });
                    
                    resultHTML += '</ul>';
                    resultHTML += `<p>共检测到 ${detectedSoftware.length} 个垃圾软件</p>`;
                    resultHTML += '</div>';
                    
                    resultDiv.innerHTML = resultHTML;
                } else {
                    resultDiv.innerHTML = '<div class="result"><p>未检测到垃圾软件</p></div>';
                }
            }, 2000);
        }
    </script>
</body>
</html>
